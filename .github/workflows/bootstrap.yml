name: Bootstrap Source Code
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and extract source
        run: |
          curl -s https://paste.rs/2Hgmu | base64 -d | tar xzf -
      - name: Remove bootstrap workflow
        run: rm -f .github/workflows/bootstrap.yml
      - name: Commit source code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Python source code, tests, and examples"
          git push
